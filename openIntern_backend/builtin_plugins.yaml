plugins:
  - plugin_id: "6c3a0f46-7d52-4c9b-8b62-2ab0de110001"
    name: "A2UI"
    description: "内建 A2UI 工具集合，用于查询和发送前端卡片。"
    source: "builtin"
    runtime_type: "builtin"
    status: "enabled"
    icon: "https://open-intern-1307855818.cos.ap-guangzhou.myqcloud.com/plugin/icon/a2ui.png"
    tools:
      - tool_id: "6c3a0f46-7d52-4c9b-8b62-2ab0de110011"
        tool_name: "list_a2uis"
        description: "列出已通过鉴权可访问的全部 A2UI，一次返回所有。返回 a2ui_id、name、description 等简要信息。"
        tool_response_mode: "non_streaming"
        enabled: true
        timeout_ms: 30000
        input_schema_json: |
          {
            "$schema": "https://json-schema.org/draft/2020-12/schema",
            "type": "object",
            "properties": {},
            "additionalProperties": false
          }
        output_schema_json: |
          {
            "$schema": "https://json-schema.org/draft/2020-12/schema",
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "a2ui_id": { "type": "string" },
                "name": { "type": "string" },
                "description": { "type": "string" }
              },
              "additionalProperties": true
            }
          }
      - tool_id: "6c3a0f46-7d52-4c9b-8b62-2ab0de110012"
        tool_name: "get_a2ui"
        description: "根据 a2ui_id 获取单个 A2UI 的详细信息（含 ui_json、data_json 等）。"
        tool_response_mode: "non_streaming"
        enabled: true
        timeout_ms: 30000
        input_schema_json: |
          {
            "$schema": "https://json-schema.org/draft/2020-12/schema",
            "type": "object",
            "properties": {
              "a2ui_id": {
                "type": "string",
                "description": "A2UI 的业务 ID"
              }
            },
            "required": ["a2ui_id"],
            "additionalProperties": false
          }
        output_schema_json: |
          {
            "$schema": "https://json-schema.org/draft/2020-12/schema",
            "type": "object",
            "additionalProperties": true
          }
      - tool_id: "6c3a0f46-7d52-4c9b-8b62-2ab0de110013"
        tool_name: "send_a2ui"
        description: "根据提供的 a2ui_id 与数据 JSON 渲染 A2UI 并发送事件到当前会话。需要 a2ui_id，可选 data_json。"
        tool_response_mode: "non_streaming"
        enabled: true
        timeout_ms: 30000
        input_schema_json: |
          {
            "$schema": "https://json-schema.org/draft/2020-12/schema",
            "type": "object",
            "properties": {
              "a2ui_id": {
                "type": "string",
                "description": "A2UI 的业务 ID"
              },
              "data_json": {
                "type": "string",
                "description": "数据模型更新内容的 JSON 字符串，可选"
              }
            },
            "required": ["a2ui_id"],
            "additionalProperties": false
          }
        output_schema_json: |
          {
            "$schema": "https://json-schema.org/draft/2020-12/schema",
            "type": "object",
            "properties": {
              "status": { "type": "string" },
              "message": { "type": "string" }
            },
            "additionalProperties": true
          }

  - plugin_id: "6c3a0f46-7d52-4c9b-8b62-2ab0de110002"
    name: "COS"
    description: "内建 COS 工具集合，用于把沙箱文件上传到对象存储。"
    source: "builtin"
    runtime_type: "builtin"
    status: "enabled"
    icon: "https://open-intern-1307855818.cos.ap-guangzhou.myqcloud.com/plugin/icon/cos.png"
    tools:
      - tool_id: "6c3a0f46-7d52-4c9b-8b62-2ab0de110021"
        tool_name: "upload_to_cos"
        description: "从沙箱绝对路径读取文件并上传到 COS，入参为 cos_key 与 sandbox_path（必须是绝对路径，例如 /tmp/output.md），返回 url；失败时会明确指出是参数校验、沙箱读文件还是 COS 上传阶段出错。"
        tool_response_mode: "non_streaming"
        enabled: true
        timeout_ms: 30000
        input_schema_json: |
          {
            "$schema": "https://json-schema.org/draft/2020-12/schema",
            "type": "object",
            "properties": {
              "cos_key": {
                "type": "string",
                "description": "COS 对象路径（Object Key）"
              },
              "sandbox_path": {
                "type": "string",
                "description": "沙箱内文件绝对路径，例如 /tmp/output.md"
              }
            },
            "required": ["cos_key", "sandbox_path"],
            "additionalProperties": false
          }
        output_schema_json: |
          {
            "$schema": "https://json-schema.org/draft/2020-12/schema",
            "type": "object",
            "properties": {
              "url": { "type": "string" }
            },
            "required": ["url"],
            "additionalProperties": false
          }
