version: '3.8'

services:
  openviking:
    build: .
    container_name: openviking-server
    ports:
      - "8080:8080"
    volumes:
      # 数据持久化
      - ./data:/app/data
      # 配置文件挂载（可选，首次运行后会生成）
      - ./config:/root/.openviking
    environment:
      # 模型服务配置（通过环境变量注入，更安全）
      - VLM_API_KEY=${VLM_API_KEY:-}
      - VLM_API_BASE=${VLM_API_BASE:-https://ark.cn-beijing.volces.com/api/v3}
      - VLM_MODEL=${VLM_MODEL:-doubao-seed-1-8-251228}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_API_BASE=${EMBEDDING_API_BASE:-https://ark.cn-beijing.volces.com/api/v3}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-doubao-embedding-vision-250615}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      # 服务配置
      - OV_DATA_PATH=/app/data
      - OV_PORT=8080
      - OV_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - openviking-network

  # 可选：配合 Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: openviking-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - openviking
    restart: unless-stopped
    networks:
      - openviking-network
    profiles:
      - with-nginx

networks:
  openviking-network:
    driver: bridge